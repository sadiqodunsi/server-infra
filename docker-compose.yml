# =============================================================================
# Server Infrastructure Stack - Production Docker Compose
# =============================================================================
# App-agnostic infra: Traefik, Redis, Postgres, pgAdmin, RedisInsight, Portainer, Uptime Kuma.
# Apps extend via traefik-network for HTTP routing and backend-network for Postgres/Redis access.
# =============================================================================

name: server-infra

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ---------------------------------------------------------------------------
  # TRAEFIK - Reverse Proxy & Automatic SSL
  # ---------------------------------------------------------------------------
  # Routes HTTP/HTTPS traffic to services based on Host header.
  # Dashboard: https://traefik.<DOMAIN> (e.g. traefik.example.com)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6.11
    container_name: traefik
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    command:
      # --- API & Dashboard ---
      # Enable dashboard UI; insecure=false means it's only reachable via configured routers
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # --- Docker Provider ---
      # Discover services from container labels; only expose containers with traefik.enable=true
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
      # --- Entry Points ---
      # web=HTTP (80), websecure=HTTPS (443)
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Default TLS for all routers bound to websecure (no per-router tls=true needed)
      - "--entrypoints.websecure.http.tls=true"
      # Use Let's Encrypt resolver by default on websecure
      - "--entrypoints.websecure.http.tls.certresolver=le"
      # Redirect all HTTP traffic to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # --- Let's Encrypt (ACME) ---
      # TLS-ALPN-01 challenge: Let's Encrypt verifies domain via port 443
      # Requires: domain DNS pointing to this server, ports 80/443 open
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      # ACME CA server (prod default). Override in .env for staging/debug:
      # ACME_CA_SERVER=https://acme-staging-v02.api.letsencrypt.org/directory
      - "--certificatesresolvers.le.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}"
      # --- Logging ---
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
      - traefik-logs:/var/log/traefik
      - ./traefik/auth:/etc/traefik/auth:ro
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      # Expose this container to Traefik
      - "traefik.enable=true"
      # BasicAuth middleware - protects admin tools (pgAdmin, RedisInsight, Portainer, Uptime Kuma)
      - "traefik.http.middlewares.admin-auth.basicauth.usersfile=/etc/traefik/auth/.htpasswd"
      # IP allowlist middleware - restricts admin tools to trusted public IPs/CIDRs
      - "traefik.http.middlewares.admin-ipallowlist.ipallowlist.sourcerange=${ADMIN_IP_ALLOWLIST}"
      # HTTPS router - dashboard at https://traefik.<DOMAIN>
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=admin-ipallowlist,admin-auth"
      - "traefik.http.routers.traefik-dashboard.priority=100"

  # ---------------------------------------------------------------------------
  # REDIS - In-Memory Cache & Queue Backend
  # ---------------------------------------------------------------------------
  # Used by apps for: session storage, caching, job queues (Bull/BullMQ)
  # Data persists in Redis volume for durability across restarts.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.8-alpine3.21
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    mem_reservation: 256m
    security_opt:
      - no-new-privileges:true
    # Ports exposed only in docker-compose.local.yml (localhost dev access)
    command: >
      redis-server
      --appendonly yes
      --aclfile /usr/local/etc/redis/.users.acl
      --maxmemory ${REDIS_MAXMEMORY:-768mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-noeviction}
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
    volumes:
      - redis-data:/data
      - ./redis/.users.acl:/usr/local/etc/redis/.users.acl:ro
    networks:
      - backend-network
    healthcheck:
      # Consider Redis healthy when it responds (PONG) or requires auth (NOAUTH).
      test:
        [
          "CMD-SHELL",
          "redis-cli -h 127.0.0.1 -p 6379 ping | grep -Eq 'PONG|NOAUTH'",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # POSTGRES - Primary Database
  # ---------------------------------------------------------------------------
  # Persistent storage for all staging and production apps.
  # Access via: postgres:5432 from any container on backend-network.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.5
    container_name: postgres
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    mem_reservation: 256m
    security_opt:
      - no-new-privileges:true
    # Ports exposed only in docker-compose.local.yml (localhost dev access)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PGADMIN - Database Management UI
  # ---------------------------------------------------------------------------
  # Web UI for managing Postgres. Protected by BasicAuth.
  # Domain: pgadmin.db.example.com (set via DOMAIN in .env)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:9.13.0
    container_name: pgadmin
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    security_opt:
      - no-new-privileges:true
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - traefik-network
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      # Expose to Traefik
      - "traefik.enable=true"
      # HTTPS router - pgAdmin at https://pgadmin.db.<DOMAIN>
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.db.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.service=pgadmin"
      - "traefik.http.routers.pgadmin.middlewares=admin-ipallowlist,admin-auth"
      # Container port pgAdmin listens on
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # REDISINSIGHT - Redis Management UI
  # ---------------------------------------------------------------------------
  # Web UI for Redis: browse keys, run commands, monitor performance.
  # Add Redis connection: Host = redis, Port = 6379, Username = redis_admin, Password = password from redis/.users.acl
  # Domain: redis.db.<DOMAIN> (e.g. redis.db.example.com)
  # ---------------------------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:3.2.0
    container_name: redisinsight
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    security_opt:
      - no-new-privileges:true
    volumes:
      - redisinsight-data:/data
    networks:
      - traefik-network
      - backend-network
    depends_on:
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redisinsight.rule=Host(`redis.db.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.redisinsight.entrypoints=websecure"
      - "traefik.http.routers.redisinsight.service=redisinsight"
      - "traefik.http.routers.redisinsight.middlewares=admin-ipallowlist,admin-auth"
      - "traefik.http.services.redisinsight.loadbalancer.server.port=5540"

  # ---------------------------------------------------------------------------
  # PORTAINER - Docker Management UI
  # ---------------------------------------------------------------------------
  # Web UI for managing Docker containers, images, volumes.
  # Domain: docker.example.com (set via DOMAIN in .env).
  # Security: starts only when the "admin" profile is enabled.
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.38.1
    container_name: portainer
    profiles:
      - admin
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - traefik-network
    labels:
      # Expose to Traefik
      - "traefik.enable=${PORTAINER_EXPOSE:-false}"
      # HTTPS router - Portainer at https://docker.<DOMAIN>
      - "traefik.http.routers.portainer.rule=Host(`docker.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.service=portainer"
      - "traefik.http.routers.portainer.middlewares=admin-ipallowlist,admin-auth"
      # Portainer listens on 9000 inside container
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ---------------------------------------------------------------------------
  # UPTIME KUMA - Service Uptime Monitoring
  # ---------------------------------------------------------------------------
  # Monitors HTTP endpoints, ports, and services. Sends alerts on downtime.
  # Domain: uptime.example.com (set via DOMAIN in .env)
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:2.1.3
    container_name: uptime-kuma
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    security_opt:
      - no-new-privileges:true
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - traefik-network
      - backend-network
    labels:
      # Expose to Traefik
      - "traefik.enable=true"
      # HTTPS router - Uptime Kuma at https://uptime.<DOMAIN>
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.service=uptime-kuma"
      - "traefik.http.routers.uptime-kuma.middlewares=admin-ipallowlist,admin-auth"
      # Uptime Kuma listens on 3001 inside container
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

# =============================================================================
# NETWORKS
# =============================================================================
# traefik-network: Reverse-proxy/public network for Traefik and routable apps/UIs.
# backend-network: Internal network for Postgres, Redis, and apps/admin tools that need data access.
# =============================================================================
networks:
  traefik-network:
    name: traefik-network
    driver: bridge
  backend-network:
    name: backend-network
    driver: bridge

# =============================================================================
# VOLUMES - Persistent Data
# =============================================================================
# These volumes persist data across container restarts and recreations.
# Backup these volumes for disaster recovery.
# =============================================================================
volumes:
  traefik-letsencrypt:
    name: traefik-letsencrypt
  traefik-logs:
    name: traefik-logs
  redis-data:
    name: redis-data
  postgres-data:
    name: postgres-data
  pgadmin-data:
    name: pgadmin-data
  redisinsight-data:
    name: redisinsight-data
  portainer-data:
    name: portainer-data
  uptime-kuma-data:
    name: uptime-kuma-data
